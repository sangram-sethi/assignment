spring.application.name=nbc

# Datasource (PostgreSQL) - override credentials/host as needed
spring.datasource.url=jdbc:postgresql://localhost:5432/nbc
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
# Base64-encoded 256-bit secret used to sign/verify HS256 tokens. Override in production.
jwt.secret=bG9hbk1hbmFnZW1lbnRTdXBlclNlY3JldEtleUZvckp3dFNpZ25pbmcxMjM0NTY3OA==
# Token validity in milliseconds (24 hours)
jwt.expiration=86400000
