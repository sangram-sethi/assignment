<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <h1 class="text-4xl font-bold text-center text-white mb-2">Tic Tac Toe</h1>
    <p id="status" class="text-center text-lg text-purple-200 mb-6">Player X's turn</p>

    <div id="board" class="grid grid-cols-3 gap-3 mb-6">
      <!-- Cells injected by JS -->
    </div>

    <div class="flex items-center justify-between gap-4">
      <div class="flex gap-6 text-white">
        <div class="text-center">
          <div class="text-sm text-purple-300">Player X</div>
          <div id="scoreX" class="text-2xl font-bold">0</div>
        </div>
        <div class="text-center">
          <div class="text-sm text-purple-300">Draws</div>
          <div id="scoreDraw" class="text-2xl font-bold">0</div>
        </div>
        <div class="text-center">
          <div class="text-sm text-purple-300">Player O</div>
          <div id="scoreO" class="text-2xl font-bold">0</div>
        </div>
      </div>
      <button id="reset"
        class="bg-purple-600 hover:bg-purple-500 active:scale-95 transition text-white font-semibold px-5 py-2 rounded-lg shadow-lg">
        Restart
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
