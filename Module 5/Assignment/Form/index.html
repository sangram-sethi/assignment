<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Registration Form</title>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <div class="rounded-2xl bg-gray-800 shadow-xl ring-1 ring-white/10">
            <div class="border-b border-white/10 px-6 py-5">
                <h1 class="text-2xl font-semibold text-white">Registration Form</h1>
                <p class="mt-1 text-sm text-gray-400">Please fill in your details below.</p>
            </div>

            <form id="detailsForm" class="grid grid-cols-1 gap-6 px-6 py-6 sm:grid-cols-2" novalidate>
                <!-- Name -->
                <div class="sm:col-span-2">
                    <label for="name" class="block text-sm font-medium text-gray-200">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="name"></p>
                </div>

                <!-- Age -->
                <div>
                    <label for="age" class="block text-sm font-medium text-gray-200">Age</label>
                    <input type="number" id="age" name="age" min="1" max="120" placeholder="25"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="age"></p>
                </div>

                <!-- Date of Birth -->
                <div>
                    <label for="dob" class="block text-sm font-medium text-gray-200">Date of Birth</label>
                    <input type="date" id="dob" name="dob"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="dob"></p>
                </div>

                <!-- Gender (radio buttons) -->
                <div class="sm:col-span-2">
                    <span class="block text-sm font-medium text-gray-200">Gender</span>
                    <div class="mt-2 flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="radio" name="gender" value="Male"
                                class="h-4 w-4 border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Male
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="radio" name="gender" value="Female"
                                class="h-4 w-4 border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Female
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="radio" name="gender" value="Other"
                                class="h-4 w-4 border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Other
                        </label>
                    </div>
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="gender"></p>
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-200">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="phone"></p>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-200">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="email"></p>
                </div>

                <!-- Address -->
                <div class="sm:col-span-2">
                    <label for="address" class="block text-sm font-medium text-gray-200">Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="123 Main St, City, Country"
                        class="mt-2 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="address"></p>
                </div>

                <!-- Skills (multiple selection) -->
                <div class="sm:col-span-2">
                    <span class="block text-sm font-medium text-gray-200">Skills</span>
                    <p class="mt-1 text-xs text-gray-400">Select all that apply.</p>
                    <div class="mt-2 grid grid-cols-2 gap-3 sm:grid-cols-3">
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="C++"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            C++
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="Java"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Java
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="Python"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Python
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="JavaScript"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            JavaScript
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="C#"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            C#
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-300">
                            <input type="checkbox" name="skills" value="Go"
                                class="h-4 w-4 rounded border-white/20 bg-gray-900 text-indigo-500 focus:ring-indigo-500">
                            Go
                        </label>
                    </div>
                    <p class="mt-1 hidden text-xs text-red-400" data-error-for="skills"></p>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-end gap-3 sm:col-span-2">
                    <button type="reset"
                        class="rounded-lg border border-white/10 px-4 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 focus:outline-none">
                        Reset
                    </button>
                    <button type="submit"
                        class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-800">
                        Submit
                    </button>
                </div>
            </form>
        </div>

        <!-- Success message -->
        <div id="result" class="mt-4 hidden rounded-lg border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm text-green-300"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
