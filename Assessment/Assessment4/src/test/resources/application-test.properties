# --- Test profile -------------------------------------------------------------
# Integration tests run against a DEDICATED database so they never touch the
# Flyway-managed development/production schema. Hibernate owns the schema here:
# it creates a clean set of tables (with NUMERIC(19,2) money columns) at start-up
# and drops them at shutdown, and Flyway is disabled because create-drop already
# provisions everything. The URL is overridable (e.g. CI points it at its own
# ephemeral Postgres service).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/securebank_test}
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
