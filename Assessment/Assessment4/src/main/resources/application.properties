spring.application.name=assignment

# --- PostgreSQL datasource ---
# Credentials are externalized. Local defaults are provided for development only;
# in every non-local environment these MUST be supplied via environment variables
# (or a secrets manager) and never committed to source control.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/securebank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is owned by Flyway migrations, so Hibernate only VALIDATES that the
# mapped entities match the migrated schema. 'update' is intentionally avoided in
# real environments because it silently drifts the schema. The default can still
# be overridden per environment via SPRING_JPA_DDL_AUTO.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Flyway database migrations ---
# Versioned SQL migrations under classpath:db/migration are the single source of
# truth for schema changes. baseline-on-migrate lets Flyway adopt a pre-existing
# (already-populated) database by stamping a baseline before applying new versions.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- JWT ---
# The signing secret MUST be provided via the SECURITY_JWT_SECRET environment
# variable in real environments. The inline value is a throwaway development key.
security.jwt.secret=${SECURITY_JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1zZWN1cmUtYmFua2luZy1hcGktMjU2Yml0cw==}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:3600000}

# --- Error handling hardening ---
# Never leak internal details (messages, stack traces, binding errors) to clients.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# --- Actuator: expose only health for liveness/readiness probes ---
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Logging ---
# Console + rolling file appender. Application logs stay at INFO; framework noise
# is dialled down. All levels are env-overridable so a deployment can raise
# org.northernarc.assessment4 to DEBUG for diagnosis without a rebuild.
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.northernarc.assessment4=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}

# Written to logs/secure-banking-api.log and rolled daily / at 10MB, keeping 7
# days of history capped at 200MB total so disks never fill up.
logging.file.name=${LOG_FILE:logs/secure-banking-api.log}
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE:logs/secure-banking-api}-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=200MB
