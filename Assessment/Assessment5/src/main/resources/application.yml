spring:
  application:
    name: secure-banking-api
  datasource:
    url: jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

# Application-specific security settings
security:
  jwt:
    # 256-bit (32+ byte) secret required for HS256. Override via env in real deployments.
    secret-key: 5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F
    # Access token validity in milliseconds (1 hour)
    expiration: 3600000
