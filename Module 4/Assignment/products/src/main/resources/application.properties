spring.application.name=products

# Datasource - values externalized via environment variables (local defaults for dev only)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/project_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}

# Schema management - 'update' keeps data across restarts; override with 'validate' in prod
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

# SQL logging - disable in production via env var
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# JWT - secret MUST be provided via environment variable in any non-local environment
app.jwt.secret=${JWT_SECRET:replace-this-with-a-long-random-secret-at-least-32-bytes-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
# Set to true in any HTTPS environment so the auth cookie is only sent over TLS.
app.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}

# Seed users created on first startup (override in production via environment variables)
app.seed.admin.username=${SEED_ADMIN_USERNAME:admin}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:password}
app.seed.user.username=${SEED_USER_USERNAME:user}
app.seed.user.password=${SEED_USER_PASSWORD:password}