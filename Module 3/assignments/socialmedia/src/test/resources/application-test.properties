# In-memory H2 datasource used so the Spring context can load during tests
# without requiring a running PostgreSQL instance.
spring.datasource.url=jdbc:h2:mem:socialmedia_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
